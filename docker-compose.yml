version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379/0
      IMAP_HOST: ${IMAP_HOST}
      IMAP_PORT: ${IMAP_PORT-993}
      IMAP_SECURE: ${IMAP_SECURE-true}
      IMAP_USER: ${IMAP_USER}
      IMAP_PASSWORD: ${IMAP_PASSWORD}
      IMAP_MAILBOX: ${IMAP_MAILBOX-INBOX}
      IMAP_POLL_INTERVAL_MS: ${IMAP_POLL_INTERVAL_MS-30000}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT-587}
      SMTP_SECURE: ${SMTP_SECURE-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      REPLY_FROM: ${REPLY_FROM}
      QUEUE_NAME: ${QUEUE_NAME-email-replies}
      QUEUE_CONCURRENCY: ${QUEUE_CONCURRENCY-5}
      QUEUE_RATE_LIMIT_MAX: ${QUEUE_RATE_LIMIT_MAX-30}
      QUEUE_RATE_LIMIT_DURATION_MS: ${QUEUE_RATE_LIMIT_DURATION_MS-60000}
      PER_SENDER_MAX_REPLIES: ${PER_SENDER_MAX_REPLIES-10}
      PER_SENDER_WINDOW_MS: ${PER_SENDER_WINDOW_MS-3600000}

